sim-time-limit = 1h
cpu-time-limit = 300s
#debug-on-errors = true
#record-eventlog = true

rng-class = omnetpp::cMersenneTwister
seed-set = 3

[Config Net1]
description = "rho"

#average interarrival and service times
**.source*.avgInterArrivalTime = 4s
**.queue*.avgServiceTime = 2s


