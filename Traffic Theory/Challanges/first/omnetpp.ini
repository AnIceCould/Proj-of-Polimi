[General]
network = Net
sim-time-limit = 1h
cpu-time-limit = 300s
#debug-on-errors = true
#record-eventlog = true
**.queue*.LCFS = false

rng-class = omnetpp::cMersenneTwister
seed-set = 4

[Config Net1]
description = "rho 0.5"

#average interarrival and service times
**.source*.avgInterArrivalTime = 0.5s
**.queue*.avgServiceTime = 0.15s
**.queuerand*.avgServiceTimer = 0.2s


#theoretical average values:
#Waiting time = 0.33
#Queuing time = 0.13
#Queue length = 0.26