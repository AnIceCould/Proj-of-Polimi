[General]
network = Net
sim-time-limit = 1h
cpu-time-limit = 300s
#debug-on-errors = true
#record-eventlog = true
**.queue*.LCFS = true

rng-class = omnetpp::cMersenneTwister

seed-set = 4

[Config Net1]
description = "rho"

#average interarrival and service times
**.source*.avgInterArrivalTime = 1.5s
**.queue*.avgServiceTime = 0.2s