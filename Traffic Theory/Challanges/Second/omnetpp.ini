[General]
network = Net
sim-time-limit = 1h
cpu-time-limit = 300s
#debug-on-errors = true
#record-eventlog = true
**.buffer*.LCFS = false
**.buffer*.queueLimit = 100
**.n_servers = 8

rng-class = omnetpp::cMersenneTwister

seed-set = 4

[Config Net1]
description = "rho 0.25"

#average interarrival and service times
**.**.avgInterArrivalTime = 0.25s
**.**.avgServiceTime = 0.5s

#theoretical average values:
#Waiting time = 0.33
#Queuing time = 0.13
#Queue length = 0.26
